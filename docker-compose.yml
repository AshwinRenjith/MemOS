# ============================================================
# MemoryOS — Development Docker Compose
# ============================================================
# Usage:
#   docker compose up -d              # Start all dependencies
#   docker compose logs -f postgres   # Follow PostgreSQL logs
#   docker compose down -v            # Stop and remove volumes
# ============================================================

services:
  # --- PostgreSQL 16 (Canonical data store) ---
  postgres:
    image: postgres:16-alpine
    container_name: memoryos-postgres
    environment:
      POSTGRES_USER: memoryos_app
      POSTGRES_PASSWORD: memoryos_dev_password
      POSTGRES_DB: memoryos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schemas/sql/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoryos_app -d memoryos"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis 7 (Working memory cache) ---
  redis:
    image: redis:7-alpine
    container_name: memoryos-redis
    command: redis-server --requirepass memoryos_dev_password --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "memoryos_dev_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Qdrant (Vector store) ---
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: memoryos-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Kafka + Zookeeper (Event stream) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: memoryos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: memoryos-kafka
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  qdrantdata:
